{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}JustHire{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- CSS global do site -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />

    <!-- CSS específico de cada tela -->
    {% block extra_css %}{% endblock %}
  </head>

  <body>
    <!-- NAVBAR -->
    <nav
      class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top shadow"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'empresas' %}">
          <i class="bi bi-briefcase-fill"></i> JustHire
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menuPrincipal"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'empresas' %}">
                <i class="bi bi-building"></i> Empresas
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/admin/">
                <i class="bi bi-shield-lock"></i> Admin
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- CONTEÚDO -->
    <main class="container mt-4">{% block content %}{% endblock %}</main>

    <!-- RODAPÉ -->
    <footer class="py-4">
      <div class="container text-center">
        <p class="mb-1">
          <i class="bi bi-c-circle"></i>
          {% now "Y" %} JustHire
        </p>
        <small>Encontre sua próxima oportunidade</small>
      </div>
    </footer>

    <!-- JavaScript do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
